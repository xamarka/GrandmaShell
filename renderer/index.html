<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://api.open-meteo.com https://geocoding-api.open-meteo.com">
  <title>GrandmaShell</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <main id="home-screen" class="home">
      <div class="home__top">
        <p class="home__greeting" id="home-greeting">Что смотрим?</p>
        <div class="home__clock-group">
          <time id="clock" class="home__clock" aria-live="off"></time>
          <p class="home__date" id="home-date"></p>
        </div>
      </div>

      <div class="weather" id="weather-widget">
        <span class="weather__icon" id="weather-icon"></span>
        <span class="weather__info">
          <span class="weather__temp" id="weather-temp"></span>
          <span class="weather__city" id="weather-city"></span>
          <span class="weather__desc" id="weather-desc"></span>
        </span>
      </div>

      <div class="tiles" role="list">
      </div>

      <button class="add-tile" id="btn-add-tile" data-i18n-aria="addTile.label" aria-label="Добавить плитку">
        <svg class="add-tile__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
        <span class="add-tile__text" data-i18n="addTile.text">Добавить</span>
      </button>

    </main>

    <button
      class="power-btn"
      id="btn-shutdown"
      data-action="shutdown"
      data-i18n-aria="shutdown.label"
      aria-label="Выключить систему"
    >
      <svg class="power-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v8a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1zm6.4 3.6a1 1 0 0 1 1.4 0 9 9 0 1 1-12.8 0 1 1 0 1 1 1.4-1.4 7 7 0 1 0 9.9 0 1 1 0 0 1 1.4-1.4z"/>
      </svg>
      <span class="power-btn__text" data-i18n="shutdown.label">Выключить систему</span>
    </button>

    <nav class="toolbar" data-i18n-aria="toolbar.label" aria-label="Навигация">
      <div class="toolbar__group">
        <button class="tool tool--focused" id="nav-home" data-action="home" data-i18n-aria="tool.home" aria-label="Главная">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 3L4 9v12h5v-7h6v7h5V9z"/></svg>
          <span data-i18n="tool.home">Главная</span>
        </button>
        <button class="tool" id="nav-back" data-action="back" data-i18n-aria="tool.back" aria-label="Назад" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M20 11H7.8l5.6-5.6L12 4l-8 8 8 8 1.4-1.4L7.8 13H20v-2z"/></svg>
          <span data-i18n="tool.back">Назад</span>
        </button>
        <button class="tool" id="nav-forward" data-action="forward" data-i18n-aria="tool.forward" aria-label="Вперёд" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 4l-1.4 1.4 5.6 5.6H4v2h12.2l-5.6 5.6L12 20l8-8z"/></svg>
          <span data-i18n="tool.forward">Вперёд</span>
        </button>
        <button class="tool" id="nav-reload" data-action="reload" data-i18n-aria="tool.reload" aria-label="Обновить" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.75 10h-2.1A6 6 0 1 1 12 6c1.66 0 3.14.67 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          <span data-i18n="tool.reload">Обновить</span>
        </button>
        <button class="tool" id="nav-close" data-action="close" data-i18n-aria="tool.close" aria-label="Закрыть страницу" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19 6.4L17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z"/></svg>
          <span data-i18n="tool.close">Закрыть</span>
        </button>

      </div>

      <button class="tool tool--quit" id="nav-quit" data-action="quit" data-i18n-aria="tool.quit" aria-label="Выключить приложение">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M10.1 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h5.1V3zm2 0v18h6.9c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-6.9z"/></svg>
        <span data-i18n="tool.quit">Выход</span>
      </button>
    </nav>

    <button class="settings-btn" id="btn-settings" data-i18n-aria="tool.settings" aria-label="Настройки">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
    </button>

    <div class="settings-panel" id="settings-panel">
      <div class="settings-panel__field">
        <label class="settings-panel__label" for="settings-name" data-i18n="settings.name">Имя</label>
        <input class="settings-panel__input" id="settings-name" type="text" data-i18n-placeholder="settings.namePlaceholder" placeholder="Ваше имя" maxlength="30">
      </div>
      <div class="settings-panel__field">
        <label class="settings-panel__label" for="settings-city" data-i18n="settings.city">Город</label>
        <input class="settings-panel__input" id="settings-city" type="text" data-i18n-placeholder="settings.cityPlaceholder" placeholder="Москва" maxlength="40">
      </div>
      <div class="settings-panel__field">
        <span class="settings-panel__label" data-i18n="settings.displayMode">Режим экрана</span>
        <button class="settings-panel__display" id="settings-display">
          <svg id="display-icon-full" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
          <svg id="display-icon-window" hidden viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 14H5V8h14v10z"/></svg>
          <span id="display-label">Окно</span>
        </button>
      </div>
      <div class="settings-panel__field">
        <span class="settings-panel__label" data-i18n="settings.tiles">Плитки</span>
        <button class="settings-panel__display" id="btn-lock">
          <svg id="lock-icon-open" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10z"/></svg>
          <svg id="lock-icon-closed" hidden viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm-3-9V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z"/></svg>
          <span id="lock-label">Разблокировано</span>
        </button>
      </div>
      <div class="settings-panel__field">
        <span class="settings-panel__label" data-i18n="settings.language">Язык / Language</span>
        <button class="settings-panel__display" id="btn-lang">
          <span id="lang-label" data-i18n="lang.current">Русский</span>
        </button>
      </div>
      <div class="settings-panel__field">
        <span class="settings-panel__label" data-i18n="tool.quit">Выход</span>
        <button class="settings-panel__display" id="btn-settings-quit">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M10.1 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h5.1V3zm2 0v18h6.9c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-6.9z"/></svg>
          <span data-i18n="tool.quit">Выход</span>
        </button>
      </div>
      <div class="settings-panel__actions">
        <button class="settings-panel__btn settings-panel__btn--test" id="settings-test" data-i18n="settings.testScreen">Тест заставки</button>
        <div class="settings-panel__spacer"></div>
        <button class="settings-panel__btn" id="settings-done" data-i18n="settings.done">Готово</button>
      </div>
    </div>

    <div class="greeting-overlay" id="greeting-overlay">
      <div class="greeting-overlay__wrapper">
        <p class="greeting-overlay__text" id="greeting-text"></p>
      </div>
      <p class="greeting-overlay__bottom">
        <span class="greeting-overlay__brand">grandmashell</span>
        <span> · </span>
        <span class="greeting-overlay__author">by xamarka</span>
      </p>
    </div>

    <div class="screensaver" id="screensaver">
      <div class="screensaver__content">
        <time class="screensaver__time" id="sa-time">--:--</time>
        <p class="screensaver__date" id="sa-date"></p>
        <div class="screensaver__weather" id="sa-weather">
          <span class="screensaver__weather-icon" id="sa-wicon"></span>
          <span class="screensaver__weather-temp" id="sa-wtemp"></span>
          <span class="screensaver__weather-city" id="sa-wcity"></span>
        </div>
      </div>
    </div>

    <div class="confirm-overlay" id="confirm-overlay" aria-hidden="true">
      <div class="confirm" role="alertdialog" aria-labelledby="confirm-text">
        <p class="confirm__text" id="confirm-text"></p>
        <div class="confirm__actions">
          <button class="confirm__btn confirm__btn--no" id="confirm-no" data-i18n="modal.cancel">Отмена</button>
          <button class="confirm__btn confirm__btn--yes" id="confirm-yes" data-i18n="modal.delete">Удалить</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-labelledby="modal-title">
        <div class="modal__header">
          <h2 class="modal__title" id="modal-title">Добавить плитку</h2>
        </div>
        <form class="modal__form" id="modal-form">
          <input type="hidden" id="edit-id" value="">
          <label class="modal__field">
            <span class="modal__label" data-i18n="modal.name">Название</span>
            <input class="modal__input" id="input-name" type="text" data-i18n-placeholder="modal.namePlaceholder" placeholder="YouTube" required>
          </label>
          <label class="modal__field">
            <span class="modal__label" data-i18n="modal.url">URL</span>
            <input class="modal__input" id="input-url" type="url" data-i18n-placeholder="modal.urlPlaceholder" placeholder="https://www.youtube.com/" required>
          </label>
          <div class="modal__row">
            <label class="modal__field">
              <span class="modal__label" data-i18n="modal.color1">Цвет 1</span>
              <input class="modal__input modal__input--color" id="input-color1" type="color" value="#ff4500">
            </label>
            <label class="modal__field">
              <span class="modal__label" data-i18n="modal.color2">Цвет 2</span>
              <input class="modal__input modal__input--color" id="input-color2" type="color" value="#8b0000">
            </label>
          </div>
          <div class="modal__presets">
            <span class="modal__preset-label" data-i18n="modal.gradient">Градиент</span>
            <div class="modal__preset-grid" id="preset-grid"></div>
          </div>
        </form>
        <div class="modal__actions">
          <button class="modal__btn modal__btn--delete" id="modal-delete" data-i18n="modal.delete" hidden>Удалить</button>
          <div class="modal__spacer"></div>
          <button class="modal__btn modal__btn--cancel" id="modal-cancel" data-i18n="modal.cancel">Отмена</button>
          <button class="modal__btn modal__btn--save" id="modal-save" data-i18n="modal.save">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
